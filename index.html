<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Antrenman">
<meta name="theme-color" content="#111111">
<title>Antrenman Planı</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#f2efe9;--card:#fff;--dark:#111;--accent:#ff4500;--muted:#999;--border:#e0ddd6;--green:#16a34a;--fire:#ff6b00}
html{height:100%}
body{height:100%;background:var(--bg);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;display:flex;flex-direction:column;overflow:hidden;max-width:500px;margin:0 auto}

#topbar{background:var(--dark);color:#fff;padding:14px 16px 0;flex-shrink:0}
.tb-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.app-title{font-size:17px;font-weight:900;letter-spacing:1px}
.app-title b{color:var(--accent)}
.tb-right{display:flex;align-items:center;gap:8px}
.streak-badge{display:flex;align-items:center;gap:4px;background:rgba(255,107,0,.2);border:1px solid rgba(255,107,0,.4);border-radius:999px;padding:5px 11px;font-size:13px;font-weight:700;color:#ffaa44}
.week-ctrl{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600}
.wbtn{background:none;border:none;color:#fff;font-size:20px;line-height:1;cursor:pointer;padding:0;opacity:.7}

#dayTabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;-webkit-overflow-scrolling:touch}
#dayTabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;border:none;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);font-family:inherit;position:relative}
.dtab.active{background:var(--accent);color:#fff}
.dtab.rd{opacity:.4}
.dtab.today-tab{box-shadow:0 0 0 2px #fff}
.dtab.done-day::after{content:'✓';position:absolute;top:-3px;right:-3px;background:var(--green);color:#fff;border-radius:50%;width:14px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:900}

#mainScroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}

/* TODAY BANNER */
.today-banner{background:linear-gradient(135deg,#ff4500,#ff6b00);border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;color:#fff}
.today-banner .tb-icon{font-size:24px}
.today-banner h3{font-size:14px;font-weight:800;margin-bottom:1px}
.today-banner p{font-size:11px;opacity:.8}

/* COMPLETE BAR */
.complete-bar{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.complete-bar .cb-text p{font-size:13px;color:var(--muted)}
.complete-bar .cb-text b{display:block;font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px}
.btn-complete{background:var(--accent);color:#fff;border:none;border-radius:11px;padding:11px 16px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;flex-shrink:0}
.btn-complete.done{background:var(--green)}

.day-hdr{background:var(--card);border-radius:14px;padding:15px;margin-bottom:12px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.day-hdr h2{font-size:18px;font-weight:800;color:var(--dark);margin-bottom:3px}
.day-hdr p{font-size:12px;color:var(--muted)}
.day-stats{display:flex;gap:8px}
.dstat{background:var(--bg);border-radius:10px;padding:7px 11px;text-align:center}
.dstat strong{display:block;font-size:19px;font-weight:900;color:var(--accent);line-height:1}
.dstat span{font-size:10px;color:var(--muted);font-weight:600}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px 2px}

/* EXERCISE CARD */
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
.ex-hdr{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer;-webkit-user-select:none;user-select:none}
.ex-num{width:34px;height:34px;background:var(--dark);color:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ex-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--bg);color:#555}
.chip.hi{background:rgba(255,69,0,.1);color:var(--accent)}
.cat{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
.cg{background:#dbeafe;color:#1d4ed8}.cc{background:#fee2e2;color:#dc2626}.ck{background:#d1fae5;color:#065f46}.ce{background:#fef9c3;color:#854d0e}
.arr{font-size:18px;color:var(--muted);flex-shrink:0;transition:transform .25s;line-height:1}
.arr.open{transform:rotate(90deg)}

/* GIF PANEL */
.gif-panel{border-top:1px solid var(--border);background:#f8f7f4;padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.gif-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);align-self:flex-start}
.gif-wrap{width:180px;height:180px;border-radius:14px;overflow:hidden;background:var(--border);display:flex;align-items:center;justify-content:center;position:relative}
.gif-wrap img{width:100%;height:100%;object-fit:cover}
.gif-wrap .gif-loading{position:absolute;font-size:28px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.gif-note{font-size:12px;color:var(--muted);text-align:center;line-height:1.5;max-width:220px}

/* EDIT PANEL */
.ep{border-top:1px solid var(--border);padding:14px;background:#f8f7f4}
.eg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.eg .full{grid-column:1/-1}
.ef{display:flex;flex-direction:column;gap:4px}
.ef label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.ef input,.ef select{border:1.5px solid var(--border);border-radius:9px;padding:10px 12px;font-size:15px;font-weight:600;font-family:inherit;color:var(--dark);background:#fff;outline:none;width:100%;-webkit-appearance:none}
.ef input:focus,.ef select:focus{border-color:var(--accent)}
.ebtns{display:flex;gap:8px}
.bsave{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.bdel{background:#fee2e2;color:#dc2626;border:none;border-radius:10px;padding:12px 14px;font-size:16px;cursor:pointer}

/* REST */
.rest-card{background:var(--card);border:2px dashed var(--border);border-radius:14px;padding:28px 16px;text-align:center;margin-bottom:12px}
.rest-card .ri{font-size:40px;margin-bottom:8px}
.rest-card h3{font-size:17px;font-weight:800;color:var(--dark);margin-bottom:5px}
.rest-card p{font-size:13px;color:var(--muted);margin-bottom:14px}
.rest-items{text-align:left;background:var(--bg);border-radius:12px;padding:10px 14px}
.rest-items div{font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);color:var(--dark)}
.rest-items div:last-child{border-bottom:none}

.add-btn{width:100%;background:#fff;border:2px dashed var(--border);border-radius:14px;padding:13px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;margin-top:8px}
.toggle-rest-btn{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;margin-top:6px}

/* GOALS */
#goalsView{display:none;flex-direction:column;flex:1;overflow:hidden}
#goalsView.on{display:flex}
.g-hdr{background:var(--dark);color:#fff;padding:20px 16px;flex-shrink:0;text-align:center}
.g-hdr h2{font-size:20px;font-weight:800;margin-bottom:2px}
.g-hdr p{font-size:12px;opacity:.5;margin-bottom:10px}
.g-pct{font-size:50px;font-weight:900;color:var(--accent);line-height:1}
.g-sub{font-size:12px;opacity:.55;margin-top:3px}
.g-bar{background:rgba(255,255,255,.15);height:6px;border-radius:999px;margin-top:12px;overflow:hidden}
.g-bar-f{height:100%;background:var(--accent);border-radius:999px;transition:width .5s}
#goalsScroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.g-item{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;-webkit-user-select:none}
.g-item.done{background:#f0fdf4;border-color:#86efac}
.g-badge{width:32px;height:32px;border-radius:8px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.g-item.done .g-badge{background:var(--green)}
.g-txt{flex:1;font-size:13px;font-weight:500;color:var(--dark);line-height:1.4}
.g-chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;color:transparent}
.g-item.done .g-chk{background:var(--green);border-color:var(--green);color:#fff}

/* STREAK */
#streakView{display:none;flex-direction:column;flex:1;overflow:hidden}
#streakView.on{display:flex}
.sk-hdr{background:var(--dark);color:#fff;padding:20px 16px;flex-shrink:0;text-align:center}
.sk-hdr h2{font-size:20px;font-weight:800;margin-bottom:4px}
.sk-hdr p{font-size:12px;opacity:.5}
.sk-fire{font-size:56px;margin:10px 0 4px}
.sk-num{font-size:60px;font-weight:900;color:var(--fire);line-height:1}
.sk-lbl{font-size:13px;opacity:.6;margin-top:4px}
#streakScroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.sk-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sk-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center}
.sk-stat strong{display:block;font-size:28px;font-weight:900;color:var(--accent);line-height:1;margin-bottom:4px}
.sk-stat span{font-size:12px;color:var(--muted);font-weight:500}
.sk-cal-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:4px 0 10px 2px}
.sk-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.sk-cal-head{font-size:9px;font-weight:700;text-align:center;color:var(--muted);padding:2px 0}
.sk-day{aspect-ratio:1;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:var(--muted)}
.sk-day.trained{background:var(--accent);color:#fff}
.sk-day.is-today{border:2px solid var(--dark)}
.sk-day.rest-d{background:#f0f0e8;color:#ccc}

/* BNAV */
#bnav{background:var(--dark);display:flex;flex-shrink:0;padding:10px 0 16px}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-family:inherit;padding:4px 0}
.nb.on{color:#fff}
.nb .ni{font-size:20px}
.nb .nl{font-size:9px;font-weight:700;letter-spacing:.8px}

/* MODAL */
#mOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;align-items:flex-end;justify-content:center}
#mOverlay.on{display:flex}
.mbox{background:#fff;border-radius:22px 22px 0 0;padding:22px 18px 30px;width:100%;max-width:500px;animation:su .28s ease;max-height:90vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mbox h3{font-size:18px;font-weight:800;margin-bottom:16px;color:var(--dark)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mg .full{grid-column:1/-1}
.mf{display:flex;flex-direction:column;gap:4px}
.mf label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.mf input,.mf select{border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:15px;font-weight:600;font-family:inherit;color:var(--dark);background:var(--bg);outline:none;width:100%;-webkit-appearance:none}
.mf input:focus,.mf select:focus{border-color:var(--accent)}
.msave{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:8px}
.mcancel{width:100%;background:var(--bg);color:var(--muted);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}

/* DONE OVERLAY */
.done-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:60;display:none;align-items:center;justify-content:center}
.done-overlay.on{display:flex}
.done-box{background:#fff;border-radius:24px;padding:32px 28px;text-align:center;max-width:290px;width:90%}
.done-box .be{font-size:60px;margin-bottom:8px}
.done-box h3{font-size:21px;font-weight:900;color:var(--dark);margin-bottom:6px}
.done-box p{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.done-box .ds{font-size:52px;font-weight:900;color:var(--fire);line-height:1}
.done-box .dl{font-size:13px;color:var(--muted);margin-bottom:18px}
.done-close{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:999px;font-size:13px;font-weight:600;z-index:99;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .3s}
#toast.on{opacity:1}
</style>
</head>
<body>

<div id="workoutView" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
  <div id="topbar">
    <div class="tb-row">
      <div class="app-title">ANTRENMAN<b>.</b></div>
      <div class="tb-right">
        <div class="streak-badge">🔥 <span id="streakTop">0</span></div>
        <div class="week-ctrl">
          <button class="wbtn" id="wP">‹</button>
          <span id="wL">Hafta 1</span>
          <button class="wbtn" id="wN">›</button>
        </div>
      </div>
    </div>
    <div id="dayTabs"></div>
  </div>
  <div id="mainScroll"></div>
</div>

<div id="goalsView">
  <div class="g-hdr">
    <h2>Hedefler 🎯</h2><p>Yaz 2025 · 12 hedef</p>
    <div class="g-pct" id="gP">0%</div>
    <div class="g-sub" id="gS">0 / 12 tamamlandı</div>
    <div class="g-bar"><div class="g-bar-f" id="gB" style="width:0%"></div></div>
  </div>
  <div id="goalsScroll"></div>
</div>

<div id="streakView">
  <div class="sk-hdr">
    <h2>Seri 🔥</h2><p>Tutarlılık güç demek</p>
    <div class="sk-fire">🔥</div>
    <div class="sk-num" id="skNum">0</div>
    <div class="sk-lbl">günlük seri</div>
  </div>
  <div id="streakScroll"></div>
</div>

<div id="bnav">
  <button class="nb on" id="nW" onclick="sv('w')"><span class="ni">🏋️</span><span class="nl">ANTRENMAN</span></button>
  <button class="nb" id="nG" onclick="sv('g')"><span class="ni">🎯</span><span class="nl">HEDEFLER</span></button>
  <button class="nb" id="nS" onclick="sv('s')"><span class="ni">🔥</span><span class="nl">SERİ</span></button>
</div>

<div id="mOverlay">
  <div class="mbox">
    <h3>＋ Egzersiz Ekle</h3>
    <div class="mg">
      <div class="mf full"><label>Egzersiz Adı</label><input id="mNm" type="text" placeholder="örn. Bench Press"></div>
      <div class="mf"><label>Tip</label>
        <select id="mTp" onchange="mtc()">
          <option value="sr">Set × Tekrar</option><option value="st">Set × Süre</option>
          <option value="t">Sadece Süre</option><option value="d">Mesafe</option>
        </select>
      </div>
      <div class="mf"><label>Kategori</label>
        <select id="mCt"><option value="g">Güç</option><option value="c">Kardio</option><option value="k">Core</option><option value="e">Esneklik</option></select>
      </div>
      <div class="mf" id="fSets"><label>Set</label><input id="mSt" type="number" value="3" min="1" max="20"></div>
      <div class="mf" id="fReps"><label>Tekrar</label><input id="mRp" type="number" value="10" min="1" max="200"></div>
      <div class="mf" id="fW"><label>Ağırlık (kg)</label><input id="mWg" type="number" value="5" min="0" max="300" step="2.5"></div>
      <div class="mf full" id="fDur" style="display:none"><label>Süre (saniye)</label><input id="mDr" type="number" value="60" min="5"></div>
      <div class="mf full" id="fDst" style="display:none"><label>Mesafe (m)</label><input id="mDs" type="number" value="400" min="10"></div>
      <div class="mf full"><label>Not (opsiyonel)</label><input id="mNo" type="text" placeholder="Teknik ipucu..."></div>
    </div>
    <button class="msave" onclick="addEx()">Ekle ✓</button>
    <button class="mcancel" onclick="cm()">İptal</button>
  </div>
</div>

<div class="done-overlay" id="doneOverlay">
  <div class="done-box">
    <div class="be">💪</div>
    <h3>Harika iş!</h3>
    <p>Antrenman tamamlandı. Seri devam ediyor!</p>
    <div class="ds" id="doneStreak">1</div>
    <div class="dl">🔥 günlük seri</div>
    <button class="done-close" onclick="closeDone()">Devam Et →</button>
  </div>
</div>

<div id="toast"></div>

<script>
var DAYS=['PZT','SAL','ÇRŞ','PRŞ','CMA','CTS','PAZ'];
var DN={PZT:'Pazartesi',SAL:'Salı',ÇRŞ:'Çarşamba',PRŞ:'Perşembe',CMA:'Cuma',CTS:'Cumartesi',PAZ:'Pazar'};
var DEFAULT_REST={ÇRŞ:1,CMA:1,PAZ:1};
var FC={PZT:'Alt Vücut Güç',SAL:'Üst Vücut Güç',PRŞ:'Kardio + Core',CTS:'Full Body Test'};
var RI={
  ÇRŞ:{t:'Aktif Dinlenme',s:'Hafif hareket, kasları gevşet',i:['30 dk yürüyüş veya bisiklet','Köpük silindir ile sırt & bacak','Genel esneme 10 dk']},
  CMA:{t:'Dinlenme & Esneme',s:'Esneklik çalışması',i:['Hamstring esnemesi 3×40 sn','Kalça açma hareketleri','Omuz & sırt esnemesi']},
  PAZ:{t:'Tam Dinlenme',s:'Toparlan ve hazırlan',i:['7–9 saat uyku','Bol su iç (min. 2.5 lt)','Yarınki antrenman için hazırlan']}
};
var GOALS=[
  {id:1,t:"1,5 km'yi 8 dakikanın altında koş"},
  {id:2,t:"400m sprinti 1:30'dan hızlı koş"},
  {id:3,t:"Bench press'te vücut ağırlığı kaldır"},
  {id:4,t:"Deadlift'te 1.5× vücut ağırlığı"},
  {id:5,t:"Squat'ta kendi kilo seviyesi"},
  {id:6,t:"Set halinde 10 temiz barfiks"},
  {id:7,t:"30 şınav durmadan"},
  {id:8,t:"Plank — minimum 2 dakika"},
  {id:9,t:"Barfiks demirinde 60 sn asılı kal"},
  {id:10,t:"Dizleri kırmadan ayak parmaklarına uzan"},
  {id:11,t:"Farmer walk — kendi kilonu 50m taşı"},
  {id:12,t:"Ara vermeden 10 tam burpee"}
];

// ── GIF MAP (wger.de free exercise database) ──
// Using publicly available exercise GIFs
var GIFS={
  squat:{url:'https://media.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif',note:'Diz ucu ayak parmak hizasında, sırt düz'},
  deadlift:{url:'https://media.giphy.com/media/3o7btPCcdNniyf0ArS/giphy.gif',note:'Sırtı düz tut, bar vücuda yakın kalsın'},

function getGif(name){
  var n=(name||'').toLowerCase();
  if(n.includes('squat'))return GIFS.squat;
  if(n.includes('deadlift'))return GIFS.deadlift;
  if(n.includes('bench'))return GIFS.bench;
  if(n.includes('barfiks')||n.includes('pull-up')||n.includes('pullup'))return GIFS.pullup;
  if(n.includes('şınav')||n.includes('pushup')||n.includes('push'))return GIFS.pushup;
  if(n.includes('plank'))return GIFS.plank;
  if(n.includes('koşu')||n.includes('run')||n.includes('tempo'))return GIFS.run;
  if(n.includes('sprint'))return GIFS.sprint;
  if(n.includes('lunge'))return GIFS.lunge;
  if(n.includes('burpee'))return GIFS.burpee;
  if(n.includes('farmer'))return GIFS.farmer;
  if(n.includes('ohp')||n.includes('overhead')||n.includes('press'))return GIFS.ohp;
  if(n.includes('çekiş')||n.includes('row'))return GIFS.row;
  if(n.includes('calf'))return GIFS.calf;
  if(n.includes('asılı')||n.includes('hang'))return GIFS.hang;
  if(n.includes('esnem')||n.includes('stretch')||n.includes('hamstring'))return GIFS.stretch;
  return GIFS.default;
}

// ── AUTO DAY DETECTION ──
function getTodayDayKey(){
  var d=new Date();
  var jsDay=d.getDay(); // 0=Sun,1=Mon...6=Sat
  // Map to our array: PZT=Mon=1, SAL=Tue=2, ÇRŞ=Wed=3, PRŞ=Thu=4, CMA=Fri=5, CTS=Sat=6, PAZ=Sun=0
  var map={0:'PAZ',1:'PZT',2:'SAL',3:'ÇRŞ',4:'PRŞ',5:'CMA',6:'CTS'};
  return map[jsDay];
}

function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function isRest(d){
  if(customRestDays[d]==='train')return false;
  if(customRestDays[d]==='rest')return true;
  return !!DEFAULT_REST[d];
}

function isDayTrained(dateStr){return trainedDates.indexOf(dateStr)!==-1;}

function fmtS(s){var m=Math.floor(s/60),r=s%60;if(m>0)return r>0?m+':'+(r<10?'0':'')+r:m+' dk';return s+' sn';}

function chips(ex){
  var a=[];
  if(ex.t==='sr'){a.push({x:ex.s+'×'+ex.r+' tekrar',h:1});if(ex.w>0)a.push({x:ex.w+' kg',h:0});}
  else if(ex.t==='st'){a.push({x:ex.s+'×'+fmtS(ex.sec),h:1});if(ex.w>0)a.push({x:ex.w+' kg',h:0});}
  else if(ex.t==='t'){a.push({x:fmtS(ex.sec),h:1});}
  else if(ex.t==='d'){a.push({x:ex.dist+'m',h:1});if(ex.s>1)a.push({x:ex.s+' set',h:0});if(ex.w>0)a.push({x:ex.w+' kg',h:0});}
  return a;
}
function cc(c){return{g:'cg',c:'cc',k:'ck',e:'ce'}[c]||'cg';}
function cl(c){return{g:'Güç',c:'Kardio',k:'Core',e:'Esneklik'}[c]||c;}

    if(d===cDay)cls+=' active';

  }

      } else {
        h+='<div class="cb-text"><b>Antrenmanı bitirdin mi?</b><p>Tamamla butonu serisini artırır 🔥</p></div><button class="btn-complete" onclick="completeDay()">Tamamla 💪</button>';
      }
      h+='</div>';
    }

    var info=RI[cDay]||{t:'Dinlenme',s:'Bugün dinlen',i:['Aktif iyileşme','Esneme hareketleri']};
    var ih='';for(var ii=0;ii<info.i.length;ii++)ih+='<div>✦ '+info.i[ii]+'</div>';
    h+='<div class="rest-card"><div class="ri">🛌</div><h3>'+info.t+'</h3><p>'+info.s+'</p><div class="rest-items">'+ih+'</div></div>';
  } else {
    h+='<div class="sec-lbl">Egzersizler</div>';
    for(var k=0;k<exs.length;k++)h+=exCard(exs[k],k+1);
    h+='<button class="add-btn" onclick="openAdd(\''+cDay+'\')">＋ Egzersiz Ekle</button>';
  }

  // Toggle rest button
  var isDefaultRest=!!DEFAULT_REST[cDay];

  h+='<button class="toggle-rest-btn" onclick="toggleRest(\''+cDay+'\')">'+(isCurrentlyRest?'🏋️ Antrenman Günü Yap':'🛌 Dinlenme Günü Yap')+'</button>';

  el.innerHTML=h;
}

function toggleRest(d){
  if(customRestDays[d]==='train'){delete customRestDays[d];}
  else if(customRestDays[d]==='rest'){delete customRestDays[d];}
  else if(DEFAULT_REST[d]){customRestDays[d]='train';}
  else{customRestDays[d]='rest';}
  lss('customRest5',customRestDays);
  renderTabs();renderDay();
  toast(isRest(d)?'Dinlenme günü yapıldı 🛌':'Antrenman günü yapıldı 💪');
}

// ── COMPLETE ──
function completeDay(){
  var today=todayStr();
  if(trainedDates.indexOf(today)===-1){
    trainedDates.push(today);
    lss('trained5',trainedDates);
    var yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    var yStr=yesterday.getFullYear()+'-'+(yesterday.getMonth()+1)+'-'+yesterday.getDate();
    if(streak===0||trainedDates.indexOf(yStr)!==-1){streak++;}
    else{streak=1;}
    lss('streak5',streak);
  }
  ge('doneStreak').textContent=streak;
  ge('doneOverlay').classList.add('on');
  renderTabs();renderDay();
}

function tc(id){openId=(openId===id)?null:id;renderDay();}
function gv(id){var el=ge(id);return el?el.value:null;}
function gn(id,def){var v=gv(id);return v!==null?(parseFloat(v)||def):def;}

function saveEx(id){
  var exs=getEx(cDay),ex=null;
  for(var i=0;i<exs.length;i++){if(exs[i].id===id){ex=exs[i];break;}}
  if(!ex)return;
  var nm=gv('en_'+id);if(nm&&nm.trim())ex.n=nm.trim();
  if(ex.t==='sr'){ex.s=Math.max(1,gn('es_'+id,ex.s));ex.r=Math.max(1,gn('er_'+id,ex.r));ex.w=Math.max(0,gn('ew_'+id,ex.w));}
  else if(ex.t==='st'){ex.s=Math.max(1,gn('es_'+id,ex.s));ex.sec=Math.max(5,gn('et_'+id,ex.sec));ex.w=Math.max(0,gn('ew_'+id,ex.w));}
  else if(ex.t==='t'){ex.sec=Math.max(5,gn('et_'+id,ex.sec));}
  else if(ex.t==='d'){ex.dist=Math.max(1,gn('edi_'+id,ex.dist));ex.s=Math.max(1,gn('es_'+id,ex.s));ex.w=Math.max(0,gn('ew_'+id,ex.w));}
  var no=ge('eno_'+id);if(no)ex.no=no.value;
  setEx(cDay,exs);openId=null;renderDay();toast('Kaydedildi ✓');
}
function delEx(id){setEx(cDay,getEx(cDay).filter(function(x){return x.id!==id;}));openId=null;renderDay();toast('Silindi');}

// ── STREAK ──
function calcBest(){
  if(!trainedDates.length)return 0;
  var s=trainedDates.slice().sort(),best=1,cur=1;
  for(var i=1;i<s.length;i++){
    var a=new Date(s[i-1].replace(/-/g,'/')),b=new Date(s[i].replace(/-/g,'/'));
    var diff=(b-a)/(86400000);
    if(diff===1){cur++;if(cur>best)best=cur;}else if(diff>1)cur=1;
  }
  return best;
}
function renderStreak(){
  ge('skNum').textContent=streak;
  var best=calcBest(),total=trainedDates.length;
  var h='<div class="sk-stats">';
  h+='<div class="sk-stat"><strong>'+streak+'</strong><span>Mevcut Seri 🔥</span></div>';
  h+='<div class="sk-stat"><strong>'+best+'</strong><span>En İyi Seri 🏆</span></div>';
  h+='<div class="sk-stat"><strong>'+total+'</strong><span>Toplam Antrenman</span></div>';
  h+='<div class="sk-stat"><strong>'+Math.min(100,Math.round(total/48*100))+'%</strong><span>Program İlerlemesi</span></div>';
  h+='</div>';
  h+='<div class="sk-cal-lbl">Son 28 Gün</div><div class="sk-cal">';
  var dayLbls=['Pt','Sa','Ça','Pe','Cu','Ct','Pa'];
  for(var i=0;i<7;i++)h+='<div class="sk-cal-head">'+dayLbls[i]+'</div>';
  var now=new Date(),todayS=todayStr();
  // align to Monday start
  var dow=now.getDay();var offset=(dow===0?6:dow-1);
  var startDate=new Date(now);startDate.setDate(now.getDate()-offset-21);
  for(var d=0;d<28;d++){
    var dd=new Date(startDate);dd.setDate(startDate.getDate()+d);
    var ds=dd.getFullYear()+'-'+(dd.getMonth()+1)+'-'+dd.getDate();
    var jsDow=dd.getDay();
    var isRD=(jsDow===0||jsDow===3||jsDow===5);
    var trained=trainedDates.indexOf(ds)!==-1;
    var isT=ds===todayS;
    var cls='sk-day'+(trained?' trained':'')+(isT?' is-today':'')+(isRD&&!trained?' rest-d':'');
    h+='<div class="'+cls+'">'+(trained?'✓':dd.getDate())+'</div>';
  }
  h+='</div>';
  ge('streakScroll').innerHTML=h;
}

function sv(v){
  ge('workoutView').style.display=v==='w'?'flex':'none';
  ge('goalsView').classList.toggle('on',v==='g');
  ge('streakView').classList.toggle('on',v==='s');
  ge('nW').classList.toggle('on',v==='w');
  ge('nG').classList.toggle('on',v==='g');
  ge('nS').classList.toggle('on',v==='s');
  if(v==='g')renderGoals();
  if(v==='s')renderStreak();
}

function toast(m){var el=ge('toast');el.textContent=m;el.classList.add('on');clearTimeout(tt);tt=setTimeout(function(){el.classList.remove('on');},2200);}

  });
